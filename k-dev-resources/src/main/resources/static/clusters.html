<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>集群状态</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e9ecef;
            color: #333;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .status-container {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            margin: 20px;
        }
        .disaster {
            color: #d9534f;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .activity {
            color: #5cb85c;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .running-cluster {
            color: #5bc0de;
            font-size: 13px;
            margin-bottom: 5px;
            padding: 8px;
            border: 1px solid #5bc0de;
            border-radius: 5px;
            background-color: #e8f4f8;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .warning-icon, .active-icon {
            width: 50px;
            height: 50px;
            color: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }
        .warning-icon {
            background-color: #d9534f;
        }
        .active-icon {
            background-color: #5cb85c;
        }
        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        .refresh-time {
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
            font-size: 13px;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
    </style>
    <script>
        function updateRefreshTime() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const formattedTime = now.toLocaleString('zh-CN', options);
            document.getElementById('refresh-time').innerText = '最后刷新时间: ' + formattedTime;
        }


        // 每两秒刷新页面
        setInterval(function() {
            location.href = location.href; // 刷新页面
            updateRefreshTime(); // 更新刷新时间
        }, 5000);

        // 页面加载时更新刷新时间
        window.onload = updateRefreshTime;
        // 显示为po
    </script>
</head>
<body>

<div class="status-container">
    <div class="dis disaster">当前集群状态：${status}</div>

    <div class="running-cluster">我的集群：<strong>${myClusterNo}</strong></div>
    <div class="running-cluster">主集群：<strong>${activeClusterNo}</strong></div>
    <div class="running-cluster">主节点：<strong>${masterNodeName}</strong></div>

    <div id="refresh-time" class="refresh-time"></div> <!-- 刷新时间显示 -->

    <table>
        <thead>
        <tr>
            <th>集群号</th>
            <th>实例主机</th>
            <th>实例端口</th>
            <th>活动时间</th>
            <th>在线状态</th>
        </tr>
        </thead>
        <tbody>
        ${rows}
        </tbody>
    </table>
</div>

</body>
</html>
