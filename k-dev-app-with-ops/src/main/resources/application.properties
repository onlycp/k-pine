# region server
server.servlet.context-path=/ops/pine
server.port=8080
server.tomcat.accept-count=1000
server.tomcat.max-connections=10000
server.tomcat.threads.min-spare=100
server.tomcat.threads.max=800
# endregion server

# region spring
spring.jackson.date-format = yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=100MB
spring.servlet.multipart.max-request-size=1024MB
spring.servlet.multipart.max-file-size=512MB
spring.mvc.async.request-timeout=300000
# endregion spring

# region database
database.sources.db.databaseType=kdb
database.sources.db.channel=kdbHttp
database.sources.db.innerType=MySql
database.sources.db.server=http://127.0.0.1:10081
database.sources.db.executeSqlApi=/api/execute4debug
# DB??:?????:?????
database.sources.db.dbName=db:MySql:MySql,kingDB:kingDB:HSQLDB
# endregion database

# region encrypt
encrypt.mode=base64
# endregion encrypt

# region auth
app.auth.enable=true
app.auth.iss=kingsware
app.auth.tokenExpireMinutes=120
app.auth.tokenSecret=3kj0ByucpznafmRd
app.auth.login-session-one=false
# endregion auth

# region pine dev mode
app.mode.dev=false
app.file-local-to-faas=true
# endregion pine dev mode

# region file
file.base-path = upload
file.write-list = png,jpg,jpeg,gif,svg,html,tif,bmp,pic,pdf,doc,docx,xls,xlsx,ppt,pptx,csv,jar,license,wps,txt,rar,zip,gz,wav,mp3,wma,aac,flac,avi,mpg,mov,mp4,pine,json,xml

# region k-flow
app.k-flow.enable=true
app.k-flow.call-model=sdk
# endregion k-flow
