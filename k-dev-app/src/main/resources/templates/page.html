<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <title>${title}</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/amis@beta/sdk/sdk.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/amis@beta/sdk/helper.css"/>

    <style>
        html, body, .app-wrapper { position: relative;width: 100%;height: 100%;margin: 0;padding: 0;}
        .amis-scope .cxd-Form-item--normal > .cxd-Form-label .cxd-Form-star { position: static; left: -0.375rem; top: 0.1875rem; }
        .cxd-Table-table .cxd-PlainField { word-break: break-all !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none !important;margin: 0;}
        input[type="number"] { -moz-appearance: textfield;}
    </style>
</head>
<body>
<div id="root" class="app-wrapper"></div>
<script src="https://cdn.jsdelivr.net/npm/amis@beta/sdk/sdk.js"></script>
<script type="text/javascript">
    (function () {
        let amis = amisRequire('amis/embed');
        let amisJSON = ${json};
        let amisScoped = amis.embed('#root', amisJSON, {
            session: 'global',
        }, {toastPosition: "center", useMobileUI: false});
        let amisLib = amisRequire('amis')
    })();
</script>
</body>
</html>
