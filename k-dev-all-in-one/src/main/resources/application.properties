# region server
server.servlet.context-path=/
server.servlet.multipart.max-file-size=2GB
server.servlet.multipart.max-request-size=2GB
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/javascript,text/css,application/javascript
server.compression.min-response-size=256
# endregion server

# region pine server
pine.server.host=127.0.0.1
#  endregion pine server

# region spring
spring.profiles.active=pine
spring.jackson.date-format = yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=true
spring.servlet.multipart.enabled=true
# endregion spring

# region database
database.sources.db.databaseType=kdb
database.sources.db.channel=kdbHttp
database.sources.db.innerType=MySql
database.sources.db.server=http://10.11.4.22:8001
database.sources.db.executeSqlApi=/api/execute
# DB??:?????:?????
database.sources.db.dbName=db:MySql:MySql,kingDB:kingDB:HSQLDB
# endregion database

# region encrypt
encrypt.mode=aes
encrypt.aes.secret=PsLZlcuUJBUB8yPo
# endregion encrypt

# region pine dev mode
app.mode.dev=false
# endregion pine dev mode

# region k-flow
app.k-flow.enable=true
app.k-flow.call-model=sdk
# endregion k-flow

# region auth
